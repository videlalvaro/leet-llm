      <text x="82" y="18" fill="#FFFFFF">METAL</text>
      <rect x="143" y="5" width="5" height="5" fill="#00B8A9"/>
      <text x="164" y="18" fill="#FFFFFF">APPLE SILICON</text>
    </g>

    <text x="72" y="588" fill="#B9CBFF" font-family="Menlo, monospace" font-size="13" letter-spacing="0.9">48 GUIDED LESSONS / NATIVE MACOS STUDIO / COMPANION BOOK</text>
  </g>

